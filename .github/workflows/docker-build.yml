name: Docker Build (ARM64)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/frambourse-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/frambourse-ui

jobs:
  build:
    name: Build images linux/arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # nécessaire pour push sur GHCR

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. QEMU — émulation ARM64 sur runner x86_64 ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ── 3. Buildx ─────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container   # nécessaire pour multi-platform + cache

      # ── 4. Login GHCR (uniquement sur push, pas sur PR) ───────────────────────
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Metadata backend ───────────────────────────────────────────────────
      - name: Docker metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── 6. Build backend ──────────────────────────────────────────────────────
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── 7. Metadata frontend ──────────────────────────────────────────────────
      - name: Docker metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── 8. Build frontend ─────────────────────────────────────────────────────
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      # ── 9. Résumé dans le job ─────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 🍓 FramBourse — Build summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Plateforme | Action |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`frambourse-api\` | linux/arm64 | ${{ github.event_name == 'push' && 'build + push GHCR' || 'build only (PR)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| \`frambourse-ui\`  | linux/arm64 | ${{ github.event_name == 'push' && 'build + push GHCR' || 'build only (PR)' }} |" >> $GITHUB_STEP_SUMMARY
