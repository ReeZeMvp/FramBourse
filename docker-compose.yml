# ── FramBourse — Raspberry Pi 5 (ARM64) ───────────────────────────────────────
# Déploiement : les images sont buildées par GitHub Actions (CI) et publiées
# sur GHCR. Le Pi tire simplement les images — plus de build local nécessaire.
#   docker compose pull && docker compose up -d
#
# Exposition : Caddy (stack simul_ir) gère frambourse.kaalynn.fr sur le réseau
# partagé "caddy-net". Les ports 80/443 NE sont PAS exposés ici.

services:

  backend:
    image: ghcr.io/reezem vp/frambourse-api:latest
    build:                          # conservé pour dev local uniquement
      context: ./backend
      dockerfile: Dockerfile
    container_name: frambourse-api
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/frambourse.db
      UPLOAD_DIR: ./data/uploads
      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000"]'}
    volumes:
      - frambourse-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frambourse-net   # réseau interne (frontend ↔ backend)
      - caddy-net        # réseau partagé avec le Caddy de simul_ir

  frontend:
    image: ghcr.io/reezem vp/frambourse-ui:latest
    build:                          # conservé pour dev local uniquement
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: frambourse-ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frambourse-net   # réseau interne
      - caddy-net        # réseau partagé avec le Caddy de simul_ir

volumes:
  frambourse-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}

networks:
  frambourse-net:
    driver: bridge
  caddy-net:
    external: true   # créé une seule fois : docker network create caddy-net
