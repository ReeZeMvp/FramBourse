# ── FramBourse — Raspberry Pi 5 (ARM64) ───────────────────────────────────────
# Place behind Nginx Proxy Manager.
# Map backend → frambourse-api.local  and  frontend → frambourse.local
# (or use a single domain with path-based routing)

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    container_name: frambourse-api
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/frambourse.db
      UPLOAD_DIR: ./data/uploads
      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY:-}
      CORS_ORIGINS: '["http://frontend:3000", "http://frambourse.local", "http://localhost:3000"]'
    volumes:
      - frambourse-data:/app/data
    ports:
      - "8000:8000"           # remove/comment in production (NPM handles routing)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frambourse-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    container_name: frambourse-ui
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    ports:
      - "3000:3000"           # remove/comment in production (NPM handles routing)
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frambourse-net

volumes:
  frambourse-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}   # mount host dir so DB survives rebuilds

networks:
  frambourse-net:
    driver: bridge
